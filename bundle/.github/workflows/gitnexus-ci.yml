# GitNexus merge-time impact gate.
# Fails PRs that change high-blast-radius symbols without touching tests, and surfaces a risk report.
# Copy this file into your repo's .github/workflows/ (the kit installs it for you).
name: GitNexus impact gate

on:
  pull_request:
    branches: [main, master]

jobs:
  impact-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so base...HEAD diff works

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: GitNexus impact gate
        env:
          GITNEXUS_CI_MODE: block # set to "warn" to report without failing
          GITNEXUS_CI_HIGH: "8"
        run: node scripts/gitnexus-ci.mjs "${{ github.base_ref }}"
